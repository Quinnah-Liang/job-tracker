<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Offerly · 求职申请作战指挥室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,400&family=JetBrains+Mono:wght@400;500;600&family=Inter+Tight:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root {
    --bg: #f5f3ee;
    --bg-card: #fbfaf6;
    --bg-elevated: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #4a4a4a;
    --ink-muted: #8a8680;
    --line: #e6e2d8;
    --line-soft: #efece4;
    --accent: #1a1a1a;
    --accent-ink: #f5f3ee;
    --success: #2d5a3d;
    --success-bg: #e4ede3;
    --warning: #8a5a1a;
    --warning-bg: #f3e8d4;
    --danger: #8a2a2a;
    --danger-bg: #f3dcdc;
    --info: #2a4a6a;
    --info-bg: #dde7ef;
    --purple: #5a3a7a;
    --purple-bg: #e8dff0;
    --shadow-sm: 0 1px 2px rgba(26,26,26,0.04), 0 1px 1px rgba(26,26,26,0.03);
    --shadow: 0 4px 12px rgba(26,26,26,0.06), 0 2px 4px rgba(26,26,26,0.04);
    --shadow-lg: 0 12px 32px rgba(26,26,26,0.1), 0 4px 8px rgba(26,26,26,0.05);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter Tight', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  .serif { font-family: 'Fraunces', serif; font-optical-sizing: auto; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  /* Layout */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--bg-card);
    border-right: 1px solid var(--line);
    padding: 24px 16px;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .brand {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding: 0 12px 32px 12px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 20px;
  }
  .brand-logo {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 26px;
    letter-spacing: -1px;
    font-style: italic;
  }
  .brand-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--danger); display: inline-block;
    margin-bottom: 4px;
  }
  .brand-sub {
    font-size: 10px;
    color: var(--ink-muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-left: 2px;
  }
  .nav-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-muted);
    padding: 0 12px;
    margin: 16px 0 8px;
    font-weight: 500;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 500;
    color: var(--ink-soft);
    transition: all 0.15s ease;
    font-size: 13px;
    margin-bottom: 2px;
  }
  .nav-item:hover { background: var(--line-soft); color: var(--ink); }
  .nav-item.active {
    background: var(--ink);
    color: var(--accent-ink);
  }
  .nav-item.active .nav-badge { background: rgba(255,255,255,0.2); color: white; }
  .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
  .nav-badge {
    margin-left: auto;
    background: var(--line);
    color: var(--ink-soft);
    font-size: 11px;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
  }

  /* Main */
  .main {
    padding: 28px 40px 40px;
    max-width: 1600px;
    width: 100%;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .crumb {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--ink-muted);
    font-weight: 500;
  }
  .topbar-actions { display: flex; gap: 10px; align-items: center; }
  .page-title {
    font-family: 'Fraunces', serif;
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -1.5px;
    margin: 4px 0 6px;
    line-height: 1.05;
    font-style: italic;
  }
  .page-title em { font-style: italic; font-weight: 500; }
  .page-sub {
    color: var(--ink-muted);
    font-size: 14px;
    margin-bottom: 28px;
    max-width: 600px;
  }

  /* Buttons */
  .btn {
    border: 1px solid var(--line);
    background: var(--bg-elevated);
    color: var(--ink);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { border-color: var(--ink); }
  .btn-primary {
    background: var(--ink);
    color: var(--accent-ink);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: #000; }
  .btn-ghost { background: transparent; border-color: transparent; }
  .btn-ghost:hover { background: var(--line-soft); border-color: transparent; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-icon { padding: 7px; width: 32px; height: 32px; justify-content: center; }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink-muted);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .stat-value {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 500;
    letter-spacing: -1.5px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-delta {
    font-size: 11px;
    color: var(--ink-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .stat-delta.positive { color: var(--success); }
  .stat-delta.negative { color: var(--danger); }
  .stat-card.featured {
    background: var(--ink);
    color: var(--accent-ink);
    border-color: var(--ink);
  }
  .stat-card.featured .stat-label,
  .stat-card.featured .stat-delta { color: rgba(255,255,255,0.6); }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
    padding-bottom: 0;
  }
  .tab {
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* Kanban */
  .kanban {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    min-height: 500px;
  }
  .column {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    min-height: 400px;
    transition: background 0.15s ease;
  }
  .column.drag-over {
    background: var(--line-soft);
    border-color: var(--ink);
  }
  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 4px 12px;
    border-bottom: 1px solid var(--line-soft);
    margin-bottom: 10px;
  }
  .col-title {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    font-size: 13px;
  }
  .col-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .col-count {
    font-size: 11px;
    color: var(--ink-muted);
    background: var(--line-soft);
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
  }
  .col-body {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    overflow-y: auto;
    max-height: calc(100vh - 320px);
    padding: 2px;
  }

  /* Card */
  .card {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px;
    cursor: grab;
    transition: all 0.15s ease;
    position: relative;
  }
  .card:hover {
    border-color: var(--ink);
    box-shadow: var(--shadow);
    transform: translateY(-1px);
  }
  .card.dragging { opacity: 0.4; cursor: grabbing; }
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .card-company {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }
  .company-logo {
    width: 24px;
    height: 24px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 11px;
    color: white;
    flex-shrink: 0;
    font-family: 'Fraunces', serif;
  }
  .company-name {
    font-size: 11px;
    color: var(--ink-muted);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-role {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.35;
    margin-bottom: 8px;
    color: var(--ink);
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .chip {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.2px;
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .chip-success { background: var(--success-bg); color: var(--success); }
  .chip-warn { background: var(--warning-bg); color: var(--warning); }
  .chip-danger { background: var(--danger-bg); color: var(--danger); }
  .chip-info { background: var(--info-bg); color: var(--info); }
  .chip-purple { background: var(--purple-bg); color: var(--purple); }
  .chip-muted { background: var(--line-soft); color: var(--ink-muted); }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 8px;
    border-top: 1px solid var(--line-soft);
    font-size: 11px;
    color: var(--ink-muted);
  }
  .deadline {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .deadline.urgent { color: var(--danger); font-weight: 600; }
  .deadline.soon { color: var(--warning); font-weight: 600; }
  .progress-mini {
    display: flex;
    gap: 2px;
  }
  .progress-dot {
    width: 14px;
    height: 3px;
    border-radius: 2px;
    background: var(--line);
  }
  .progress-dot.done { background: var(--ink); }

  /* Multi-role indicator */
  .multi-role-badge {
    position: absolute;
    top: -6px;
    right: 10px;
    background: var(--purple);
    color: white;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  /* Add card */
  .add-card {
    border: 1.5px dashed var(--line);
    background: transparent;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    color: var(--ink-muted);
    cursor: pointer;
    transition: all 0.15s ease;
    margin-top: 4px;
  }
  .add-card:hover {
    border-color: var(--ink);
    color: var(--ink);
    background: var(--bg-elevated);
  }

  /* Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26,26,26,0.4);
    backdrop-filter: blur(4px);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .modal {
    background: var(--bg-elevated);
    border-radius: 16px;
    width: 90%;
    max-width: 880px;
    max-height: 90vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease;
  }
  .modal-head {
    padding: 20px 28px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-head-content { display: flex; align-items: center; gap: 14px; }
  .modal-title {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.5px;
  }
  .modal-body {
    padding: 24px 28px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-foot {
    padding: 16px 28px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .modal-close {
    width: 32px; height: 32px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
  }
  .modal-close:hover { border-color: var(--ink); color: var(--ink); }

  /* Form */
  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .form-full { grid-column: 1 / -1; }
  label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--ink-muted);
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }
  input, select, textarea {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    background: var(--bg-elevated);
    color: var(--ink);
    transition: border-color 0.15s ease;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--ink);
  }
  textarea { resize: vertical; min-height: 70px; }

  /* Interview Room */
  .interview-room {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 0;
    height: calc(100vh - 220px);
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .room-side {
    border-right: 1px solid var(--line);
    padding: 16px 12px;
    overflow-y: auto;
    background: var(--bg-card);
  }
  .room-main {
    padding: 28px 32px;
    overflow-y: auto;
    background: var(--bg-elevated);
  }
  .room-item {
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.15s ease;
    border: 1px solid transparent;
  }
  .room-item:hover { background: var(--bg-elevated); }
  .room-item.active {
    background: var(--bg-elevated);
    border-color: var(--line);
  }
  .room-item-head {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .room-item-role {
    font-weight: 600;
    font-size: 12px;
    line-height: 1.3;
  }
  .room-item-meta {
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 4px;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .room-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--ink-muted);
    padding: 0 8px;
    margin: 4px 0 8px;
    font-weight: 600;
  }
  .interview-section {
    margin-bottom: 28px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line-soft);
  }
  .section-title {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }
  .qa-block {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-left: 3px solid var(--info);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .qa-question {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .qa-answer {
    font-size: 12px;
    color: var(--ink-soft);
    line-height: 1.6;
  }
  .qa-meta {
    font-size: 10px;
    color: var(--ink-muted);
    margin-top: 6px;
    display: flex;
    gap: 10px;
  }

  /* ============ SPREADSHEET VIEW ============ */
  .sheet-toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sheet-search {
    position: relative;
    flex: 1;
    min-width: 240px;
    max-width: 320px;
  }
  .sheet-search input {
    padding-left: 32px;
    height: 34px;
    background: var(--bg-elevated);
  }
  .sheet-search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--ink-muted);
    pointer-events: none;
  }
  .sheet-filter-chip {
    background: var(--bg-elevated);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 500;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all 0.15s ease;
  }
  .sheet-filter-chip:hover { border-color: var(--ink); }
  .sheet-filter-chip.active {
    background: var(--ink);
    color: var(--accent-ink);
    border-color: var(--ink);
  }
  .sheet-filter-chip .x-btn {
    margin-left: 2px;
    opacity: 0.7;
    width: 14px; height: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 3px;
  }
  .sheet-filter-chip .x-btn:hover { background: rgba(255,255,255,0.2); }

  .sheet-wrap {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }
  .sheet-scroll {
    overflow: auto;
    max-height: calc(100vh - 280px);
    position: relative;
  }
  .sheet {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 12.5px;
    min-width: 1200px;
  }
  .sheet thead th {
    background: var(--bg-card);
    border-bottom: 1.5px solid var(--line);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--ink);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: sticky;
    top: 0;
    z-index: 3;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s ease;
  }
  .sheet thead th:hover { background: var(--line-soft); }
  .sheet thead th.th-active { background: var(--line-soft); color: var(--ink); }

  .sheet thead th .th-inner {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sheet thead th .th-filter-btn {
    width: 16px; height: 16px;
    border-radius: 3px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-muted);
    opacity: 0.6;
  }
  .sheet thead th:hover .th-filter-btn { opacity: 1; }
  .sheet thead th .th-filter-btn.has-filter {
    background: var(--ink);
    color: white;
    opacity: 1;
  }
  .sheet thead th .th-sort {
    opacity: 0.4;
    font-size: 10px;
  }
  .sheet thead th .th-sort.active { opacity: 1; }

  .sheet tbody td {

const daysUntil = (dateStr) => {
  const target = new Date(dateStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
};

const formatDaysBadge = (days) => {
  if (days < 0) return { text: `过期 ${-days}天`, className: 'urgent' };
  if (days === 0) return { text: '今日截止', className: 'urgent' };
  if (days <= 3) return { text: `${days}天后截止`, className: 'urgent' };
  if (days <= 7) return { text: `${days}天后截止`, className: 'soon' };
  return { text: `${days}天后截止`, className: '' };
};

    arrowDown: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="6 9 12 15 18 9"/></svg>,
    bookmark: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>,
    external: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>,
    heart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
  };
  return icons[name] || null;
};

// ============ ROOT ============
function App() {
  const DATA_VERSION = 3;
  const [data, setData] = useState(() => {
    const saved = localStorage.getItem('offerly-data');
    const savedVersion = localStorage.getItem('offerly-version');
    if (saved && savedVersion === String(DATA_VERSION)) {
      try { return JSON.parse(saved); } catch(e){}
    }
    // Fresh install or schema upgrade: use seed data
    localStorage.setItem('offerly-version', String(DATA_VERSION));
    return SEED_DATA;
  });
  const [view, setView] = useState('board');
  const [modalApp, setModalApp] = useState(null);
  const [addModalOpen, setAddModalOpen] = useState(false);
  const [selectedCompany, setSelectedCompany] = useState(null);
  const [selectedInterview, setSelectedInterview] = useState(null);

  useEffect(() => {
    localStorage.setItem('offerly-data', JSON.stringify(data));
  }, [data]);

  const interviewApps = data.applications.filter(a => a.stage === 'interview');

  useEffect(() => {
    if (view === 'interview' && !selectedInterview && interviewApps.length > 0) {
      setSelectedInterview(interviewApps[0].id);
    }
  }, [view, selectedInterview, interviewApps]);

  const updateApp = (id, patch) => {
    setData(d => ({ ...d, applications: d.applications.map(a => a.id === id ? { ...a, ...patch } : a) }));
  };
  const addApp = (newApp) => {
    setData(d => ({ ...d, applications: [...d.applications, { ...newApp, id: 'a' + Date.now() }] }));
  };
  const deleteApp = (id) => {
    setData(d => ({ ...d, applications: d.applications.filter(a => a.id !== id) }));
  };

  // Stats
  const stats = useMemo(() => {
    const total = data.applications.length;
    const active = data.applications.filter(a => !['result','wishlist'].includes(a.stage)).length;
    const interviewing = data.applications.filter(a => a.stage === 'interview').length;
    const offers = data.applications.filter(a => a.stage === 'result' && a.result === 'offer').length;
    const urgent = data.applications.filter(a => {
      if (['result','wishlist'].includes(a.stage)) return false;
      const d = daysUntil(a.deadline);
      return d >= 0 && d <= 3;
    }).length;
    return { total, active, interviewing, offers, urgent };
  }, [data.applications]);

  return (
    <div className="app">
      <aside className="sidebar">
        <div className="brand">
          <span className="brand-logo">Offerly</span>
          <span className="brand-dot"></span>
          <span className="brand-sub">'26</span>
        </div>
        <div className="nav-label">工作区</div>
        <div className={`nav-item ${view==='board'?'active':''}`} onClick={()=>setView('board')}>
          <Icon name="kanban"/> <span>申请看板</span>
          <span className="nav-badge">{stats.active}</span>
        </div>
        <div className={`nav-item ${view==='sheet'?'active':''}`} onClick={()=>setView('sheet')}>
          <Icon name="table"/> <span>投递汇总</span>
          <span className="nav-badge">{data.applications.length}</span>
        </div>
        <div className={`nav-item ${view==='calendar'?'active':''}`} onClick={()=>setView('calendar')}>
          <Icon name="calendar"/> <span>日历视图</span>
          {stats.urgent > 0 && <span className="nav-badge" style={{background: 'var(--danger)', color: 'white'}}>{stats.urgent}</span>}
        </div>
        <div className={`nav-item ${view==='companies'?'active':''}`} onClick={()=>setView('companies')}>
          <Icon name="building"/> <span>公司档案</span>
          <span className="nav-badge">{data.companies.length}</span>
        </div>
        <div className={`nav-item ${view==='interview'?'active':''}`} onClick={()=>setView('interview')}>
          <Icon name="chat"/> <span>面试进度概览</span>
          {stats.interviewing > 0 && <span className="nav-badge">{stats.interviewing}</span>}
        </div>
        <div className={`nav-item ${view==='materials'?'active':''}`} onClick={()=>setView('materials')}>
          <Icon name="folder"/> <span>材料库</span>
          <span className="nav-badge">{data.materials.length}</span>
        </div>
        <div className={`nav-item ${view==='resources'?'active':''}`} onClick={()=>setView('resources')}>
          <Icon name="bookmark"/> <span>资源库</span>
          <span className="nav-badge">{(data.resources || []).length}</span>
        </div>
        <div className={`nav-item ${view==='analytics'?'active':''}`} onClick={()=>setView('analytics')}>
          <Icon name="chart"/> <span>转化分析</span>
        </div>

        <div className="nav-label" style={{marginTop: 28}}>本周提醒</div>
        {data.applications
          .filter(a => {
            if (['result','wishlist'].includes(a.stage)) return false;
            const d = daysUntil(a.deadline);
            return d >= 0 && d <= 7;
          })
          .sort((a,b) => daysUntil(a.deadline) - daysUntil(b.deadline))
          .slice(0, 3)
          .map(a => {
            const company = data.companies.find(c => c.id === a.companyId);
            const days = daysUntil(a.deadline);
            return (
              <div key={a.id} style={{padding: '8px 12px', fontSize: 11, color: 'var(--ink-soft)', borderLeft: '2px solid var(--danger)', marginBottom: 6, marginLeft: 4, cursor: 'pointer'}} onClick={() => setModalApp(a)}>
                <div style={{fontWeight: 600, color: 'var(--ink)'}}>{company?.name}</div>
                <div style={{color: 'var(--ink-muted)', marginTop: 2}}>
                  {days === 0 ? '今日截止' : `${days}天后截止`}
                </div>
              </div>
            );
          })
        }
      </aside>

      <main className="main">
        {view === 'board' && (
          <BoardView data={data} setData={setData} stats={stats}
            onCardClick={setModalApp} onAddClick={() => setAddModalOpen(true)}
            updateApp={updateApp} />
        )}
        {view === 'sheet' && (
          <SheetView data={data} updateApp={updateApp}
            onCardClick={setModalApp} onAddClick={() => setAddModalOpen(true)}/>
        )}
        {view === 'calendar' && <CalendarView data={data} onCardClick={setModalApp}/>}
        {view === 'companies' && (
          <CompaniesView data={data} onCompanyClick={setSelectedCompany}
            selectedCompany={selectedCompany} onCardClick={setModalApp}/>
        )}
        {view === 'interview' && (
          <InterviewRoom data={data} selectedId={selectedInterview}
            onSelect={setSelectedInterview} setData={setData}/>
        )}
        {view === 'materials' && <MaterialsView data={data} setData={setData}/>}
        {view === 'resources' && <ResourcesView data={data} setData={setData}/>}
        {view === 'analytics' && <AnalyticsView data={data}/>}
      </main>

      {modalApp && (
        <AppDetailModal app={modalApp} data={data}
          onClose={() => setModalApp(null)}
          onUpdate={(patch) => { updateApp(modalApp.id, patch); setModalApp({...modalApp, ...patch}); }}
          onDelete={() => { deleteApp(modalApp.id); setModalApp(null); }}/>
      )}

      {addModalOpen && (
        <AddAppModal data={data} onClose={() => setAddModalOpen(false)}
          onAdd={(app) => { addApp(app); setAddModalOpen(false); }}/>
      )}
    </div>
  );
}

// ============ SHEET VIEW (INVESTMENT LEDGER) ============
function SheetView({ data, updateApp, onCardClick, onAddClick }) {
  const [sortBy, setSortBy] = useState({ key: 'companyId', dir: 'asc' });
  const [filters, setFilters] = useState({});
  const [search, setSearch] = useState('');
  const [openFilter, setOpenFilter] = useState(null);
  const [editingCell, setEditingCell] = useState(null);
  const [jdModal, setJdModal] = useState(null);

  // Columns config
  const COLS = [
    { key: 'companyId', label: '公司', width: 160, sortable: true, filterable: true, sticky: true, render: (row) => {
      const c = data.companies.find(cc => cc.id === row.companyId);
      return <div className="cell-company"><div className="company-logo" style={{background: c.color}}>{c.logo}</div><span>{c.name}</span></div>;
    }, filterValue: (row) => data.companies.find(c => c.id === row.companyId)?.name },
    { key: 'industry', label: '行业', width: 120, sortable: true, filterable: true, render: (row) => {
      const c = data.companies.find(cc => cc.id === row.companyId);
      return <span className="chip chip-muted">{c?.industry || '—'}</span>;
    }, filterValue: (row) => data.companies.find(c => c.id === row.companyId)?.industry || '—' },
    { key: 'role', label: '岗位名称', width: 220, sortable: true, editable: true },
    { key: 'roleType', label: '岗位类型', width: 110, sortable: true, filterable: true, render: (row) => {
      const colorMap = { '产品': 'chip-info', '数据分析': 'chip-purple', '商业分析': 'chip-warn', '算法': 'chip-danger', '用户研究': 'chip-success', '数据产品': 'chip-info', '增长 / 策略': 'chip-warn' };
      return <span className={`chip ${colorMap[row.roleType] || 'chip-muted'}`}>{row.roleType || '未分类'}</span>;
    } },
    { key: 'jobType', label: '招聘类型', width: 90, sortable: true, filterable: true, render: (row) => (
      <span className="chip chip-muted">{row.jobType || '—'}</span>
    ) },
    { key: 'location', label: '工作地点', width: 110, sortable: true, filterable: true, editable: true },
    { key: 'applyDate', label: '投递日期', width: 110, sortable: true, editable: true, type: 'date' },
    { key: 'deadline', label: '截止日期', width: 110, sortable: true, editable: true, type: 'date', render: (row) => {
      const days = daysUntil(row.deadline);
      const urgent = days >= 0 && days <= 3 && !['result','wishlist'].includes(row.stage);
      return <span style={{color: urgent ? 'var(--danger)' : 'inherit', fontWeight: urgent ? 600 : 400}}>{row.deadline}</span>;
    } },
    { key: 'stage', label: '状态', width: 100, sortable: true, filterable: true, render: (row) => {
      const stage = STAGES.find(s => s.id === row.stage);
      return <span className="chip" style={{background: stage.color, color: 'white'}}>{stage.name}</span>;
    }, filterValue: (row) => STAGES.find(s => s.id === row.stage)?.name },
    { key: 'salary', label: '薪资', width: 90, sortable: true, editable: true },
    { key: 'jd', label: 'JD', width: 110, render: (row) => (
      row.jd
        ? <button className="btn btn-sm" style={{padding: '3px 10px', fontSize: 11}}
            onClick={(e) => { e.stopPropagation(); setJdModal(row); }}>
            📄 查看 JD
          </button>
        : <span className="cell-empty">—</span>
    ) },
    { key: 'link', label: '投递链接', width: 180, render: (row) => (
      row.link ? <span className="cell-link"><a href={row.link} target="_blank" rel="noopener" onClick={(e) => e.stopPropagation()}>{row.link.replace(/^https?:\/\//, '').slice(0, 24)}{row.link.length > 30 ? '...' : ''}</a></span> : <span className="cell-empty">—</span>
    ) },
    { key: 'referralCode', label: '内推码', width: 110, editable: true, render: (row) => (
      row.referralCode
        ? <span className="cell-code" title="点击复制" onClick={(e) => {
            e.stopPropagation();
            navigator.clipboard && navigator.clipboard.writeText(row.referralCode);
          }}>{row.referralCode}</span>
        : <span className="cell-empty">—</span>
    ) },
    { key: 'notes', label: '备注', width: 180, editable: true, render: (row) => row.notes || <span className="cell-empty">—</span> },
  ];

  // Build filter options
  const filterOptions = useMemo(() => {
    const opts = {};
    COLS.filter(c => c.filterable).forEach(col => {
      const values = new Set();
      data.applications.forEach(row => {
        const val = col.filterValue ? col.filterValue(row) : row[col.key];
        if (val !== undefined && val !== null && val !== '') values.add(val);
      });
      opts[col.key] = Array.from(values).sort();
    });
    return opts;
  }, [data]);

  // Filter + search + sort
  const rows = useMemo(() => {
    let result = [...data.applications];

    // Search
    if (search.trim()) {
      const q = search.toLowerCase();
      result = result.filter(r => {
        const c = data.companies.find(cc => cc.id === r.companyId);
        return (
          (c?.name || '').toLowerCase().includes(q) ||
          (r.role || '').toLowerCase().includes(q) ||
          (r.roleType || '').toLowerCase().includes(q) ||
          (r.location || '').toLowerCase().includes(q) ||
          (r.notes || '').toLowerCase().includes(q)
        );
      });
    }

    // Filters
    Object.entries(filters).forEach(([key, selected]) => {
      if (!selected || selected.length === 0) return;
      const col = COLS.find(c => c.key === key);
      result = result.filter(row => {
        const val = col.filterValue ? col.filterValue(row) : row[key];
        return selected.includes(val);
      });
    });

    // Sort
    if (sortBy.key) {
      const col = COLS.find(c => c.key === sortBy.key);
      result.sort((a, b) => {
        const av = col?.filterValue ? col.filterValue(a) : a[sortBy.key];
        const bv = col?.filterValue ? col.filterValue(b) : b[sortBy.key];
        if (av == null) return 1;
        if (bv == null) return -1;
        const r = String(av).localeCompare(String(bv), 'zh');
        return sortBy.dir === 'asc' ? r : -r;
      });
    }

    return result;
  }, [data, sortBy, filters, search]);

  // Group by company (visual hint) - only when sorted by company
  const rowsWithGroup = useMemo(() => {
    if (sortBy.key !== 'companyId') return rows.map(r => ({ row: r, groupStart: false }));
    let lastCompany = null;
    return rows.map(r => {
      const isStart = r.companyId !== lastCompany;
      lastCompany = r.companyId;
      return { row: r, groupStart: isStart };
    });
  }, [rows, sortBy]);

  const toggleSort = (key) => {
    if (sortBy.key === key) {
      setSortBy({ key, dir: sortBy.dir === 'asc' ? 'desc' : 'asc' });
    } else {
      setSortBy({ key, dir: 'asc' });
    }
  };

  const toggleFilter = (key, value) => {
    setFilters(f => {
      const curr = f[key] || [];
      const next = curr.includes(value) ? curr.filter(v => v !== value) : [...curr, value];
      return { ...f, [key]: next };
    });
  };

  const clearFilter = (key) => {
    setFilters(f => { const n = {...f}; delete n[key]; return n; });
  };

  const clearAllFilters = () => { setFilters({}); setSearch(''); };
  const activeFilterCount = Object.values(filters).filter(v => v && v.length > 0).length;

  const exportCSV = () => {
    const headers = COLS.map(c => c.label);
    const rowsData = rows.map(row =>
      COLS.map(col => {
        if (col.key === 'companyId') return data.companies.find(c => c.id === row.companyId)?.name || '';
        if (col.key === 'industry') return data.companies.find(c => c.id === row.companyId)?.industry || '';
        if (col.key === 'stage') return STAGES.find(s => s.id === row.stage)?.name || '';
        return row[col.key] || '';
      })
    );
    const csv = [headers, ...rowsData].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `求职投递总账_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
  };

function FilterDropdown({ options, selected, onToggle, onClear, onClose }) {
  const ref = useRef(null);
  useEffect(() => {
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) onClose(); };
    setTimeout(() => document.addEventListener('click', handler), 0);
    return () => document.removeEventListener('click', handler);
  }, []);
  return (
    <div className="filter-dropdown" ref={ref} onClick={(e) => e.stopPropagation()} style={{top: 'calc(100% + 4px)', left: 0}}>
      <div className="filter-dropdown-head">
        <strong>筛选</strong>
        <button className="btn btn-sm btn-ghost" onClick={onClear} style={{padding: '2px 6px', fontSize: 10}}>清除</button>
      </div>
      {options.map(opt => (
        <div key={opt} className="filter-item" onClick={() => onToggle(opt)}>
          <span className={`filter-checkbox ${selected.includes(opt) ? 'checked' : ''}`}>
            {selected.includes(opt) && <Icon name="check" size={10}/>}
          </span>
          <span>{opt}</span>
        </div>
      ))}
    </div>
  );
}

// ============ CALENDAR VIEW ============
function CalendarView({ data, onCardClick }) {
  const [cursor, setCursor] = useState(new Date());
  const year = cursor.getFullYear();
  const month = cursor.getMonth();
  const firstDay = new Date(year, month, 1);
  const startDow = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrevMonth = new Date(year, month, 0).getDate();

  const cells = [];
  for (let i = startDow - 1; i >= 0; i--) {
    cells.push({ date: daysInPrevMonth - i, otherMonth: true, realDate: new Date(year, month - 1, daysInPrevMonth - i) });
  }
  for (let d = 1; d <= daysInMonth; d++) {
    cells.push({ date: d, otherMonth: false, realDate: new Date(year, month, d) });
  }
  while (cells.length < 42) {
    const d = cells.length - startDow - daysInMonth + 1;
    cells.push({ date: d, otherMonth: true, realDate: new Date(year, month + 1, d) });
  }

  const today = new Date();
  today.setHours(0,0,0,0);

  const eventsOnDay = (date) => {
    const dateStr = date.toISOString().slice(0, 10);
    const deadlines = data.applications.filter(a => a.deadline === dateStr);
    const interviewEvents = [];
    Object.entries(data.interviews || {}).forEach(([appId, info]) => {
      if (info.pending && info.pending.date === dateStr) {
        const app = data.applications.find(a => a.id === appId);
        if (app) interviewEvents.push({ ...info.pending, app, isInterview: true });
      }
    });
    return { deadlines, interviewEvents };
  };

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb">Dashboard · 时间线</div>
          <h1 className="page-title">截止日历</h1>
        </div>
        <div className="topbar-actions">
          <button className="btn btn-sm" onClick={() => setCursor(new Date())}>回到今天</button>
        </div>
      </div>
      <p className="page-sub">月历视图 · 红色 = 投递截止 · 紫色 = 面试日程 · 点击事件查看详情</p>

      <div className="calendar">
        <div className="cal-head">
          <h2 className="cal-title">
            {year} 年 {month + 1} 月
          </h2>
          <div className="cal-nav">
            <button className="btn btn-icon" onClick={() => setCursor(new Date(year, month - 1, 1))}>
              <Icon name="chevronLeft" size={14}/>
            </button>
            <button className="btn btn-icon" onClick={() => setCursor(new Date(year, month + 1, 1))}>
              <Icon name="chevronRight" size={14}/>
            </button>
          </div>
        </div>
        <div className="cal-grid">
          {['日','一','二','三','四','五','六'].map(d => (
            <div key={d} className="cal-dow">{d}</div>
          ))}
          {cells.map((cell, i) => {
            const { deadlines, interviewEvents } = eventsOnDay(cell.realDate);
            const isToday = cell.realDate.getTime() === today.getTime();
            return (
              <div key={i} className={`cal-day ${cell.otherMonth ? 'other-month' : ''} ${isToday ? 'today' : ''}`}>
                <div className="cal-date">{cell.date}</div>
                {deadlines.slice(0, 2).map(app => {
                  const company = data.companies.find(c => c.id === app.companyId);
                  const isDone = app.stage === 'result';
                  const daysLeft = daysUntil(app.deadline);
                  const cls = isDone ? 'done' : (daysLeft <= 3 ? 'urgent' : '');
                  return (
                    <div key={app.id} className={`cal-event ${cls}`} onClick={(e) => { e.stopPropagation(); onCardClick(app); }}>
                      {company?.name.slice(0,2)} · {app.role.slice(0,6)}
                    </div>
                  );
                })}
                {interviewEvents.slice(0, 1).map((ev, idx) => {
                  const company = data.companies.find(c => c.id === ev.app.companyId);
                  return (
                    <div key={idx} className="cal-event interview" onClick={(e) => { e.stopPropagation(); onCardClick(ev.app); }}>
                      面试 · {company?.name}
                    </div>
                  );
                })}
                {deadlines.length + interviewEvents.length > 3 && (
                  <div className="cal-event chip-muted">+{deadlines.length + interviewEvents.length - 3}</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </>
  );
}

    const q = prompt('输入面试问题：');

    const a = prompt('输入你的回答要点（可留空）：') || '';
    setData(d => {
      const interviews = { ...(d.interviews || {}) };
      if (!interviews[current.id]) interviews[current.id] = { rounds: [], pending: null, prep_notes: '' };

// ============ ANALYTICS VIEW ============
function AnalyticsView({ data }) {
  const funnel = useMemo(() => {
    const total = data.applications.length;
    const applied = data.applications.filter(a => !['wishlist'].includes(a.stage)).length;
    const tested = data.applications.filter(a => ['test','interview','result'].includes(a.stage)).length;
    const interviewed = data.applications.filter(a => ['interview','result'].includes(a.stage)).length;
    const offers = data.applications.filter(a => a.result === 'offer').length;

    const max = Math.max(total, 1);
    return [
      { name: '已投递', count: applied, color: '#2a4a6a', width: applied / max },
      { name: '进入笔试', count: tested, color: '#5a3a7a', width: tested / max },
      { name: '进入面试', count: interviewed, color: '#8a5a1a', width: interviewed / max },
      { name: 'Offer', count: offers, color: '#2d5a3d', width: offers / max },
    ];
  }, [data.applications]);

  const byCompany = useMemo(() => {
    const map = {};
    data.applications.forEach(a => {
      const c = data.companies.find(cc => cc.id === a.companyId);
      if (!c) return;
      if (!map[c.id]) map[c.id] = { company: c, total: 0, interview: 0, offer: 0 };
      map[c.id].total++;
      if (a.stage === 'interview') map[c.id].interview++;
      if (a.result === 'offer') map[c.id].offer++;
    });
    return Object.values(map);
  }, [data]);

  return (
    <>
      <div className="topbar">
        <div>
          <div className="crumb">Dashboard · 数据洞察</div>
          <h1 className="page-title">转化分析</h1>
        </div>
      </div>
      <p className="page-sub">定位求职漏斗中的瓶颈 · 优化材料投递策略 · 数据驱动下一步动作</p>

      <div className="funnel-container" style={{marginBottom: 20}}>
        <h3 className="section-title" style={{marginBottom: 20}}>申请转化漏斗</h3>
        <div className="funnel">
          {funnel.map((stage, i) => {
            const prevCount = i > 0 ? funnel[i-1].count : stage.count;
            const rate = prevCount > 0 ? Math.round(stage.count / prevCount * 100) : 0;
            return (
              <div key={stage.name} className="funnel-stage">
                <div className="funnel-info">
                  <div className="funnel-stage-name">{stage.name}</div>
                  <div className="funnel-rate">{stage.count} 个 {i > 0 ? `· 转化率 ${rate}%` : ''}</div>
                </div>
                <div className="funnel-bar" style={{
                  width: `${Math.max(stage.width * 100, 15)}%`,
                  background: stage.color
                }}>
                  {stage.count}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{marginTop: 20, padding: 14, background: 'var(--info-bg)', color: 'var(--info)', borderRadius: 8, fontSize: 12, lineHeight: 1.6}}>
          💡 <strong>数据洞察：</strong>投递 → 笔试转化率{funnel[0].count > 0 ? ` ${Math.round(funnel[1].count / funnel[0].count * 100)}%` : ''}，面试 → Offer 转化率{funnel[2].count > 0 ? ` ${Math.round(funnel[3].count / funnel[2].count * 100)}%` : ''}。若某环节转化明显偏低，建议针对性复盘该阶段材料或准备策略。
        </div>
      </div>

      <div className="funnel-container">
        <h3 className="section-title" style={{marginBottom: 20}}>公司分布</h3>
        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12}}>
          {byCompany.map(item => (
            <div key={item.company.id} style={{border: '1px solid var(--line)', borderRadius: 8, padding: 14, background: 'var(--bg-elevated)'}}>
              <div style={{display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8}}>
                <div className="company-logo" style={{background: item.company.color, width: 24, height: 24, fontSize: 11}}>{item.company.logo}</div>
                <div style={{fontWeight: 600, fontSize: 13}}>{item.company.name}</div>
              </div>
              <div style={{display: 'flex', gap: 8, fontSize: 11}}>
                <span className="chip chip-muted">投 {item.total}</span>
                {item.interview > 0 && <span className="chip chip-warn">面 {item.interview}</span>}
                {item.offer > 0 && <span className="chip chip-success">Offer {item.offer}</span>}
              </div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

            <textarea value={local.jd || ''} placeholder="粘贴完整的岗位描述，方便后续面试准备和对照学习..." style={{minHeight: 140}} onChange={(e) => { setLocal({...local, jd: e.target.value}); onUpdate({jd: e.target.value}); }}/>
          </div>

          <div style={{marginTop: 20, padding: 14, background: 'var(--bg-card)', borderRadius: 8, border: '1px solid var(--line)'}}>
            <div style={{fontSize: 10, textTransform: 'uppercase', letterSpacing: 1.5, color: 'var(--ink-muted)', fontWeight: 600, marginBottom: 6}}>{company.name} 投递规则</div>
            <div style={{fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5}}>{company.rule}</div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn" style={{color: 'var(--danger)'}} onClick={() => { if (confirm('确定删除？')) onDelete(); }}>删除申请</button>
          <button className="btn btn-primary" onClick={onClose}>完成</button>
        </div>
      </div>
    </div>
  );
}

// ============ ADD APP MODAL ============
function AddAppModal({ data, onClose, onAdd }) {
  const [form, setForm] = useState({
    companyId: data.companies[0]?.id || '',
    role: '',
    roleType: '产品',
    jobType: '暑期实习',
    location: '',
    salary: '',
    applyDate: new Date().toISOString().slice(0,10),
    deadline: new Date(Date.now() + 14 * 86400000).toISOString().slice(0,10),
    stage: 'applied',
    priority: 'medium',
    link: '',
    referralCode: '',
    notes: '',
    progress: { resume: true, oa: false, hr: false, tech: false, final: false },
  });

  const ROLE_TYPES = ['产品', '数据分析', '商业分析', '数据产品', '算法', '用户研究', '增长 / 策略', '运营', '技术', '其他'];
  const JOB_TYPES = ['暑期实习', '日常实习', '校招', '社招'];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={(e) => e.stopPropagation()} style={{maxWidth: 720}}>
        <div className="modal-head">
          <div className="modal-title">添加投递</div>
          <button className="modal-close" onClick={onClose}><Icon name="x" size={14}/></button>
        </div>
        <div className="modal-body">
          <div className="form-row">
            <div>
              <label>公司</label>
              <select value={form.companyId} onChange={(e) => setForm({...form, companyId: e.target.value})}>
                {data.companies.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
              </select>
            </div>
            <div>
              <label>工作地点</label>
              <input type="text" value={form.location} placeholder="如：上海" onChange={(e) => setForm({...form, location: e.target.value})}/>
            </div>
            <div className="form-full">
              <label>岗位名称</label>
              <input type="text" value={form.role} placeholder="如：数据分析师 - 广告业务" onChange={(e) => setForm({...form, role: e.target.value})}/>
            </div>
            <div>
              <label>岗位类型</label>
              <select value={form.roleType} onChange={(e) => setForm({...form, roleType: e.target.value})}>
                {ROLE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label>招聘类型</label>
              <select value={form.jobType} onChange={(e) => setForm({...form, jobType: e.target.value})}>
                {JOB_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <label>薪资</label>
              <input type="text" value={form.salary} placeholder="如：25-35K" onChange={(e) => setForm({...form, salary: e.target.value})}/>
            </div>
            <div>
              <label>当前阶段</label>
              <select value={form.stage} onChange={(e) => setForm({...form, stage: e.target.value})}>
                {STAGES.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
              </select>
            </div>
            <div>
              <label>投递日期</label>
              <input type="date" value={form.applyDate} onChange={(e) => setForm({...form, applyDate: e.target.value})}/>
            </div>
            <div>
              <label>截止日期</label>
              <input type="date" value={form.deadline} onChange={(e) => setForm({...form, deadline: e.target.value})}/>
            </div>
            <div>
              <label>投递链接</label>
              <input type="text" value={form.link} placeholder="https://..." onChange={(e) => setForm({...form, link: e.target.value})}/>
            </div>
            <div>
              <label>内推码</label>
              <input type="text" value={form.referralCode} placeholder="选填" onChange={(e) => setForm({...form, referralCode: e.target.value})}/>
            </div>
            <div>
              <label>优先级</label>
              <select value={form.priority} onChange={(e) => setForm({...form, priority: e.target.value})}>
                <option value="high">高</option>
                <option value="medium">中</option>
                <option value="low">低</option>
              </select>
            </div>
            <div className="form-full">
              <label>备注</label>
              <textarea value={form.notes} placeholder="内推人、JD 要点等..." onChange={(e) => setForm({...form, notes: e.target.value})}/>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={() => {
            if (!form.role.trim()) { alert('请填写岗位名称'); return; }
            onAdd(form);
          }}>添加</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
